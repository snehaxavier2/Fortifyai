project:
  name: fortifyai_preprocessing
  random_seed: 42

paths:
  raw_dataset: E:/Datasets/FaceForensicsPP
  processed_dataset: E:/Datasets/FFPP_Processed
  splits: E:/Datasets/FFPP_Splits
  logs: E:/Datasets/FFPP_Logs

dataset:
  compression_level: c23
  real_path: original_sequences/youtube/c23/videos
  manipulated_root: manipulated_sequences

  # Dataset policy
  total_real_videos: 1000
  total_fake_videos: 1000
  equal_fake_sampling: true

splitting:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

sampling:
  frames_per_video: 20
  recovery_range: 5

image:
  input_size: 224

face_detection:
  model: retinaface
  confidence_threshold: 0.8

system:
  num_workers: 2
  device: cpu

logging:
  save_metadata: true
  save_summary: true
